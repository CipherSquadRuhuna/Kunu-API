name: Deploy to Azure VM

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to Azure VM
        run: |
          ssh -o StrictHostKeyChecking=no azureuser@172.174.174.85 << 'EOF'
            cd /home/azureuser/Kunu-API/api
            git pull origin deploy
            
            # Undo current migrations
            npx sequelize-cli db:migrate:undo:all
            
            # Apply new migrations
            npx sequelize-cli db:migrate
      
            # Install dependencies
            npm install
      
            # Check if the app is already being managed by pm2 and restart it, or start if not
            if pm2 list | grep -q "kunu-api"; then
              pm2 restart kunu-api
            else
              pm2 start npm --name "kunu-api" -- run start
            fi
          EOF

